services:
  db:
    image: postgres:15
    container_name: sustainability-db
    environment:
      POSTGRES_DB: sustainability_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    container_name: sustainability-ai
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/describe"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build: ./backend
    container_name: sustainability-backend
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sustainability_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - AI_SERVICE_URL=http://ai-service:5000/describe
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: sustainability-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    ports:
      - "3000:80"

volumes:
  postgres_data:
